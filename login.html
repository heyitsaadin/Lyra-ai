<!DOCTYPE html>
<html lang="en">
<head>
    <title>Jarvis AI | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --accent-tan: #f5e3b0;
            --glass: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: radial-gradient(circle at top left, #f5e3b0 0%, #e5e7eb 40%, #d1d5db 100%);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Animated Aura behind the logo */
        .logo-container {
            position: relative;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .aura {
            position: absolute;
            width: 110px;
            height: 110px;
            background: var(--accent-tan);
            border-radius: 50%;
            filter: blur(35px);
            opacity: 0.5;
            animation: breathe 4s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--accent-tan);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 35px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 24px; letter-spacing: 2px; color: #000; margin-bottom: 5px; }
        .sub { font-size: 14px; color: var(--text-sub); margin-bottom: 30px; }

        .error {
            background: #fee2e2;
            color: #ef4444;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; color: #000; margin-bottom: 6px; margin-left: 4px; }

        .input-wrap {
            background: #f1f5f9;
            border-radius: 12px;
            border: 1.5px solid transparent;
            transition: 0.2s;
        }

        .input-wrap:focus-within {
            background: #fff;
            border-color: #000;
        }

        .input-wrap input {
            width: 100%;
            padding: 12px 15px;
            background: none;
            border: none;
            outline: none;
            font-size: 15px;
            color: #000;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:hover { background: #1e293b; }

        .footer-links { margin-top: 20px; font-size: 14px; color: var(--text-sub); }
        .footer-links a { color: #000; text-decoration: none; font-weight: 700; }

        .credit {
            margin-top: 30px;
            font-size: 10px;
            color: #94a3b8;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .credit span { color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-container">
            <div class="aura"></div>
            <div class="logo">
                <svg viewBox="0 0 100 100" width="55" height="55">
                    <path d="M34,29 L48,29 L51,49 L37,49 Z" fill="black"/>
                    <path d="M54,29 L63,29 Q74,29 74,39 Q74,49 63,49 L54,49 Z" fill="black"/>
                    <circle cx="42" cy="62" r="11" fill="black"/>
                    <polygon points="54,52 74,72 54,72" fill="black"/>
                </svg>
            </div>
        </div>

        <h1>JARVIS AI</h1>
        <p class="sub">Sign in to your account</p>

        {% if error %}<p class="error">{{ error }}</p>{% endif %}

        <form method="POST">
            <div class="input-group">
                <label>USERNAME</label>
                <div class="input-wrap">
                    <input type="text" name="username" placeholder="Enter your username" required autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label>PASSWORD</label>
                <div class="input-wrap">
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="footer-links">
            <p>Don't have an account? <a href="/signup">Sign Up</a></p>
        </div>

        <p class="credit">Created by <span>Aadin</span></p>
    </div>
</body>
</html>
